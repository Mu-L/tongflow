appId: io.tongflow.desktop
productName: TongFlow
copyright: Copyright © TongFlow

directories:
    output: release
    buildResources: build

# The compiled main process + runtime deps go inside the asar.
files:
    - dist/**/*
    - package.json
    - "!**/*.map"

# Bundled runtimes & the Next standalone app are copied verbatim into
# Contents/Resources/ (kept OUTSIDE the asar so binaries stay executable and
# native modules load). Populated by scripts/assemble-app.mjs + fetch-runtimes.mjs.
extraResources:
    - from: resources
      to: .
      filter:
          - "**/*"

asar: true

mac:
    category: public.app-category.graphics-design
    # Arch is selected per CI runner (arm64 / x64) via the electron-builder CLI.
    # Version-free name so /releases/latest/download/<name> stays a stable link.
    artifactName: TongFlow-mac-${arch}.${ext}
    target:
        - dmg
    # Unsigned by default — set CSC_LINK / CSC_KEY_PASSWORD + notarize creds in CI
    # to ship signed builds, then flip hardenedRuntime on.
    hardenedRuntime: false
    gatekeeperAssess: false
    # entitlements: build/entitlements.mac.plist  # add when notarizing

win:
    # Version-free name so /releases/latest/download/<name> stays a stable link.
    artifactName: TongFlow-win-setup.${ext}
    target:
        - nsis

nsis:
    oneClick: false
    perMachine: false
    allowToChangeInstallationDirectory: true

# Configure a real feed (e.g. GitHub Releases) to enable electron-updater.
publish:
    provider: github
    owner: tong-io
    repo: tongflow
    # Upload assets to a DRAFT release first. A published GitHub Release is
    # immutable the moment it goes public (repo "Immutable releases"), so
    # electron-builder's per-arch asset uploads 422 with "Cannot upload assets
    # to an immutable release" once the release is published. Drafts stay
    # mutable, so all three arch jobs append their dmg/nsis/blockmap/update-feed
    # assets to the same draft; the workflow's final `publish` job then flips it
    # to public once (`gh release edit --draft=false`) — automated, no manual
    # click, and electron-updater still sees a public release.
    releaseType: draft
